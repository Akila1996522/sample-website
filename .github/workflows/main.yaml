name: "Main Workflow"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Docker image
        run: |
          docker build -t sample-website:latest .
      - name: Push Docker image to Docker Hub
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV
          echo "Repository name: $REPO_LOWER"
          echo "Capital docker name to simple lowercase"
          docker tag sample-website:latest ghcr.io/${{ env.REPO_LOWER }}:latest
          docker push ghcr.io/${{ env.REPO_LOWER }}:latest